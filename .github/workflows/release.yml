name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libudev-dev

      # --- Install all frontend dependencies (npm workspaces) ---
      # Delete lockfile so npm resolves platform-specific optional deps (rolldown bindings) for the current CI runner
      - name: Install frontend dependencies
        shell: bash
        run: |
          rm -f package-lock.json
          npm install

      # --- ModbusSlave ---
      - name: Build slave frontend
        working-directory: frontend
        run: npm run build

      - name: Build and release ModbusSlave
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/modbussim-app
          tagName: ${{ github.ref_name }}
          releaseName: 'ModbusSim ${{ github.ref_name }}'
          releaseBody: |
            ## Downloads

            **ModbusSlave** - Modbus TCP 从站模拟器
            **ModbusMaster** - Modbus TCP 主站工具

            **egui 版**（独立原生二进制，无 WebView 依赖） — 文件名含 `-egui-` 后缀

            See the assets below to download for your platform.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # --- ModbusMaster ---
      - name: Build master frontend
        working-directory: master-frontend
        run: npm run build

      - name: Build and release ModbusMaster
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/modbusmaster-app
          tagName: ${{ github.ref_name }}
          releaseName: 'ModbusSim ${{ github.ref_name }}'
          releaseBody: |
            ## Downloads

            **ModbusSlave** - Modbus TCP 从站模拟器
            **ModbusMaster** - Modbus TCP 主站工具

            **egui 版**（独立原生二进制，无 WebView 依赖） — 文件名含 `-egui-` 后缀

            See the assets below to download for your platform.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # egui 原生二进制（与 Tauri 版并行附加到同一 release）
  release-egui:
    permissions:
      contents: write
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            arch_label: macos-aarch64
          - platform: macos-latest
            target: x86_64-apple-darwin
            arch_label: macos-x86_64
          - platform: ubuntu-22.04
            target: ''
            arch_label: linux-x86_64
          - platform: windows-latest
            target: ''
            arch_label: windows-x86_64
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: egui-release-${{ matrix.platform }}-${{ matrix.arch_label }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            libudev-dev

      - name: Build egui release binaries
        shell: bash
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            cargo build --release --target ${{ matrix.target }} -p modbussim-egui -p modbusmaster-egui
          else
            cargo build --release -p modbussim-egui -p modbusmaster-egui
          fi

      - name: Package egui binaries (Unix)
        if: matrix.platform != 'windows-latest'
        shell: bash
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            target_dir="target/${{ matrix.target }}/release"
          else
            target_dir="target/release"
          fi
          mkdir -p dist
          tar -czf dist/ModbusSlave-egui-${{ matrix.arch_label }}.tar.gz -C "$target_dir" modbussim-egui
          tar -czf dist/ModbusMaster-egui-${{ matrix.arch_label }}.tar.gz -C "$target_dir" modbusmaster-egui

      - name: Package egui binaries (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $target_dir = "target/release"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "$target_dir/modbussim-egui.exe" -DestinationPath "dist/ModbusSlave-egui-${{ matrix.arch_label }}.zip"
          Compress-Archive -Path "$target_dir/modbusmaster-egui.exe" -DestinationPath "dist/ModbusMaster-egui-${{ matrix.arch_label }}.zip"

      - name: Upload egui assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          append_body: false
