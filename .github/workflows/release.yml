name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libudev-dev

      # --- Install all frontend dependencies (npm workspaces) ---
      # Delete lockfile so npm resolves platform-specific optional deps (rolldown bindings) for the current CI runner
      - name: Install frontend dependencies
        shell: bash
        run: |
          rm -f package-lock.json
          npm install

      # --- ModbusSlave ---
      - name: Build slave frontend
        working-directory: frontend
        run: npm run build

      - name: Build and release ModbusSlave
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/modbussim-app
          tagName: ${{ github.ref_name }}
          releaseName: 'ModbusSim ${{ github.ref_name }}'
          releaseBody: |
            ## Downloads

            **ModbusSlave** - Modbus TCP 从站模拟器
            **ModbusMaster** - Modbus TCP 主站工具

            See the assets below to download for your platform.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # --- ModbusMaster ---
      - name: Build master frontend
        working-directory: master-frontend
        run: npm run build

      - name: Build and release ModbusMaster
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/modbusmaster-app
          tagName: ${{ github.ref_name }}
          releaseName: 'ModbusSim ${{ github.ref_name }}'
          releaseBody: |
            ## Downloads

            **ModbusSlave** - Modbus TCP 从站模拟器
            **ModbusMaster** - Modbus TCP 主站工具

            See the assets below to download for your platform.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
